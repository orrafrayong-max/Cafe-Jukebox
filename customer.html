<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Café Jukebox</title>
<style>
  :root {
    --bg: #1A1A2E;
    --surface: #16213E;
    --surface2: #0F3460;
    --accent: #4ECDC4;
    --text: #ffffff;
    --text2: rgba(255,255,255,0.6);
    --danger: #FF6B6B;
    --gold: #FFE66D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  .header { text-align: center; margin-bottom: 20px; }
  .header .icon { font-size: 36px; }
  .header h1 { font-size: 22px; font-weight: 500; margin-top: 8px; }
  .header .table-badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 8px;
  }

  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text2);
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .label { font-size: 13px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
  .limit-info {
    font-size: 12px;
    color: var(--text2);
    background: var(--surface);
    padding: 8px 12px;
    border-radius: 10px;
    margin-bottom: 16px;
    border-left: 3px solid var(--accent);
  }
  .limit-info b { color: var(--accent); }

  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type=text] {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text2); }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 24px;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
  }

  .result-item, .queue-item {
    background: var(--surface);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .result-item img, .queue-item img {
    width: 80px;
    height: 56px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .result-info, .queue-info { flex: 1; min-width: 0; padding: 8px 0; }
  .result-title, .queue-title {
    font-size: 13px;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }
  .result-ch { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .add-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 28px;
    padding: 12px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .queue-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text2);
  }
  .queue-pos {
    background: var(--surface2);
    color: var(--accent);
    padding: 1px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .queue-table-tag {
    color: var(--gold);
  }
  .vote-btn {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--accent);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 44px;
  }
  .vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .vote-btn .count { font-weight: 600; font-size: 13px; }

  .success-wrap { text-align: center; padding: 40px 0; }
  .success-wrap .check { font-size: 72px; }
  .success-wrap h2 { font-size: 22px; font-weight: 500; margin: 16px 0 8px; }
  .success-wrap p { color: var(--text2); font-size: 14px; line-height: 1.6; }
  .wait-badge {
    display: inline-block;
    background: var(--surface2);
    color: var(--accent);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    margin-top: 12px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 32px 0; color: var(--text2); font-size: 14px; }
  .error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 10px;
    background: rgba(255,107,107,0.1);
    padding: 8px 12px;
    border-radius: 8px;
    border-left: 3px solid var(--danger);
  }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="icon">🎵</div>
    <h1>Café Jukebox</h1>
    <div class="table-badge" id="tableBadge">โต๊ะที่ ...</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabSearch" onclick="switchTab('search')">🔍 ค้นหาเพลง</button>
    <button class="tab-btn" id="tabQueue" onclick="switchTab('queue')">📋 คิวปัจจุบัน</button>
  </div>

  <!-- Search section -->
  <div id="searchSection">
    <div class="limit-info">
      โต๊ะนี้ขอเพลงได้สูงสุด <b id="maxSongsLabel">2</b> เพลง/รอบ —
      ตอนนี้อยู่ในคิว <b id="myCountLabel">0</b> เพลง
    </div>
    <div class="label">ค้นหาเพลงที่ต้องการ</div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="ชื่อเพลง หรือ ศิลปิน..." />
      <button class="btn" id="searchBtn" onclick="searchYouTube()">ค้นหา</button>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <div id="results"></div>
  </div>

  <!-- Queue section -->
  <div id="queueSection" style="display:none">
    <div class="label">คิวเพลงตอนนี้ — โหวตเพื่อดันเพลงโปรดขึ้นเร็วขึ้น 🚀</div>
    <div id="queueList"><div class="empty">กำลังโหลด...</div></div>
  </div>

  <!-- Success section -->
  <div id="successSection" style="display:none">
    <div class="success-wrap">
      <div class="check">✅</div>
      <h2>เพิ่มเพลงสำเร็จ!</h2>
      <p id="successMsg">เพลงของคุณถูกเพิ่มในคิวแล้ว</p>
      <div class="wait-badge" id="waitBadge" style="display:none"></div>
    </div>
    <button class="btn-outline" onclick="addMore()">+ เพิ่มเพลงอีก</button>
  </div>
</div>

<script>
// ======================================================
// ⚙️ CONFIG
// ======================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtI94MsMZtEzfG43BnBdK2laTbMFyQRRkOYk-os2EwRr8kmeyH-reZhQ8zfXbL7v5t/exec';
const YOUTUBE_API_KEY = 'AIzaSyBwZD_En0APLZ3vMUGKL9sX-TiHVqH_R_4';
const MAX_SONGS_PER_TABLE = 2;

const params = new URLSearchParams(window.location.search);
const tableNumber = parseInt(params.get('table')) || 1;
document.getElementById('tableBadge').textContent = `โต๊ะที่ ${tableNumber}`;
document.getElementById('maxSongsLabel').textContent = MAX_SONGS_PER_TABLE;
document.title = `Café Jukebox — โต๊ะ ${tableNumber}`;

let queueCache = [];
let pollTimer = null;

// ======================================================
// Tabs
// ======================================================
function switchTab(tab) {
  document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
  document.getElementById('tabQueue').classList.toggle('active', tab === 'queue');
  document.getElementById('searchSection').style.display = tab === 'search' ? 'block' : 'none';
  document.getElementById('queueSection').style.display = tab === 'queue' ? 'block' : 'none';
  document.getElementById('successSection').style.display = 'none';
  if (tab === 'queue') fetchQueue();
}

// ======================================================
// Fetch queue (สำหรับแสดงรายการ + โหวต + นับจำนวนของโต๊ะตัวเอง)
// ======================================================
async function fetchQueue() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getQueue`);
    const data = await res.json();
    queueCache = data.queue || [];
    renderQueue();
    updateMyCount();
  } catch (e) {
    // เงียบไว้ รอ poll รอบถัดไป
  }
}

function updateMyCount() {
  const myCount = queueCache.filter(s => String(s.tableNumber) === String(tableNumber)).length;
  document.getElementById('myCountLabel').textContent = myCount;
}

function renderQueue() {
  const el = document.getElementById('queueList');
  if (!queueCache.length) {
    el.innerHTML = '<div class="empty">คิวว่างอยู่ — เป็นคนแรกที่ขอเพลงเลย!</div>';
    return;
  }
  el.innerHTML = queueCache.map(song => {
    const isMine = String(song.tableNumber) === String(tableNumber);
    const alreadyVoted = (song.voters || '').split(',').map(v => v.trim()).includes(String(tableNumber));
    return `
      <div class="queue-item">
        <div class="queue-info" style="padding-left:12px">
          <div class="queue-title">${escHtml(song.title)}</div>
          <div class="queue-meta">
            <span class="queue-pos">#${song.position}</span>
            <span class="queue-table-tag">โต๊ะ ${song.tableNumber}${isMine ? ' (คุณ)' : ''}</span>
            <span>~${song.estimatedWaitMinutes} นาที</span>
          </div>
        </div>
        <button class="vote-btn" ${alreadyVoted || isMine ? 'disabled' : ''}
          onclick="voteSong('${song.id}')" title="${isMine ? 'โหวตเพลงตัวเองไม่ได้' : (alreadyVoted ? 'โหวตไปแล้ว' : 'โหวตเพลงนี้')}">
          <span>▲</span>
          <span class="count">${song.votes || 0}</span>
        </button>
      </div>`;
  }).join('');
}

async function voteSong(id) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'vote', id, tableNumber })
    });
    const data = await res.json();
    if (!data.success) {
      alert(data.error || 'โหวตไม่สำเร็จ');
      return;
    }
    fetchQueue();
  } catch (e) {
    alert('โหวตไม่สำเร็จ: ' + e.message);
  }
}

// ======================================================
// YouTube Search
// ======================================================
async function searchYouTube() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const btn = document.getElementById('searchBtn');
  const errEl = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  errEl.style.display = 'none';
  document.getElementById('results').innerHTML = '';

  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&videoCategoryId=10&maxResults=5&key=${YOUTUBE_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const items = data.items || [];
    if (!items.length) {
      document.getElementById('results').innerHTML = '<div class="empty">ไม่พบเพลงที่ค้นหา</div>';
      return;
    }

    document.getElementById('results').innerHTML = items.map(item => {
      const vid = item.id.videoId;
      const title = item.snippet.title;
      const ch = item.snippet.channelTitle;
      const thumb = item.snippet.thumbnails.medium?.url || '';
      return `
        <div class="result-item">
          <img src="${thumb}" onerror="this.style.display='none'" />
          <div class="result-info">
            <div class="result-title">${escHtml(title)}</div>
            <div class="result-ch">${escHtml(ch)}</div>
          </div>
          <button class="add-btn" onclick="addSong('${escHtml(vid)}','${escHtml(title)}','${escHtml(thumb)}')" title="เพิ่มเพลง">＋</button>
        </div>`;
    }).join('');

  } catch (e) {
    errEl.textContent = 'ค้นหาไม่สำเร็จ: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ค้นหา';
  }
}

// ======================================================
// Add Song
// ======================================================
async function addSong(videoId, title, thumbnail) {
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addSong',
        tableNumber,
        title,
        youtubeVideoId: videoId,
        thumbnailUrl: thumbnail,
      })
    });
    const data = await res.json();

    if (!data.success) {
      // ✅ แสดง error จาก backend (limit / duplicate) ตรง ๆ
      errEl.textContent = data.error || 'เพิ่มเพลงไม่สำเร็จ';
      errEl.style.display = 'block';
      return;
    }

    document.getElementById('successMsg').innerHTML =
      `<strong>${escHtml(title)}</strong><br>ถูกเพิ่มในคิวโต๊ะ ${tableNumber} แล้ว 🎶`;

    document.getElementById('searchSection').style.display = 'none';
    document.getElementById('queueSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';

    // ดึงคิวใหม่เพื่อหาเวลารอของเพลงที่เพิ่งเพิ่ม
    await fetchQueue();
    const mySong = queueCache.find(s => s.title === title && String(s.tableNumber) === String(tableNumber));
    const waitBadge = document.getElementById('waitBadge');
    if (mySong) {
      waitBadge.textContent = `⏱ คิวลำดับที่ ${mySong.position} — รอประมาณ ${mySong.estimatedWaitMinutes} นาที`;
      waitBadge.style.display = 'inline-block';
    } else {
      waitBadge.style.display = 'none';
    }

  } catch (e) {
    errEl.textContent = 'เพิ่มเพลงไม่สำเร็จ: ' + e.message;
    errEl.style.display = 'block';
  }
}

function addMore() {
  switchTab('search');
  document.getElementById('successSection').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('results').innerHTML = '';
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchYouTube();
});

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ---- เริ่มต้น: โหลดคิวไว้ล่วงหน้า + poll ทุก 5 วิ (สำหรับ tab คิว) ----
fetchQueue();
pollTimer = setInterval(fetchQueue, 5000);
</script>
</body>
</html>
