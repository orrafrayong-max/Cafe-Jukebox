<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Café Jukebox</title>
<style>
  :root {
    --bg: #1A1A2E;
    --surface: #16213E;
    --surface2: #0F3460;
    --accent: #4ECDC4;
    --text: #ffffff;
    --text2: rgba(255,255,255,0.6);
    --danger: #FF6B6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header .icon { font-size: 36px; }
  .header h1 { font-size: 22px; font-weight: 500; margin-top: 8px; }
  .header .table-badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 8px;
  }

  .label { font-size: 13px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }

  .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
  input[type=text] {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text2); }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 24px;
    padding: 10px 24px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
  }

  .result-item {
    background: var(--surface);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .result-item img {
    width: 88px;
    height: 62px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .result-info { flex: 1; min-width: 0; padding: 8px 0; }
  .result-title {
    font-size: 13px;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }
  .result-ch { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .add-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 28px;
    padding: 12px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .success-wrap { text-align: center; padding: 40px 0; }
  .success-wrap .check { font-size: 72px; }
  .success-wrap h2 { font-size: 22px; font-weight: 500; margin: 16px 0 8px; }
  .success-wrap p { color: var(--text2); font-size: 14px; line-height: 1.6; }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 32px 0; color: var(--text2); font-size: 14px; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="icon">🎵</div>
    <h1>Café Jukebox</h1>
    <div class="table-badge" id="tableBadge">โต๊ะที่ ...</div>
  </div>

  <!-- Search section -->
  <div id="searchSection">
    <div class="label">ค้นหาเพลงที่ต้องการ</div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="ชื่อเพลง หรือ ศิลปิน..." />
      <button class="btn" id="searchBtn" onclick="searchYouTube()">ค้นหา</button>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <div id="results"></div>
  </div>

  <!-- Success section -->
  <div id="successSection" style="display:none">
    <div class="success-wrap">
      <div class="check">✅</div>
      <h2>เพิ่มเพลงสำเร็จ!</h2>
      <p id="successMsg">เพลงของคุณถูกเพิ่มในคิวแล้ว<br>รอฟังได้เลยครับ 🎶</p>
    </div>
    <button class="btn-outline" onclick="addMore()">+ เพิ่มเพลงอีก</button>
  </div>
</div>

<script>
// ======================================================
// ⚙️ CONFIG — เปลี่ยนค่านี้หลัง Deploy Apps Script
// ======================================================
const SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL';
const YOUTUBE_API_KEY = 'AIzaSyBwZD_En0APLZ3vMUGKL9sX-TiHVqH_R_4';

// ======================================================
// ดึง table number จาก URL: ?table=1
// ======================================================
const params = new URLSearchParams(window.location.search);
const tableNumber = parseInt(params.get('table')) || 1;
document.getElementById('tableBadge').textContent = `โต๊ะที่ ${tableNumber}`;
document.title = `Café Jukebox — โต๊ะ ${tableNumber}`;

// ======================================================
// YouTube Search
// ======================================================
async function searchYouTube() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const btn = document.getElementById('searchBtn');
  const errEl = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  errEl.style.display = 'none';
  document.getElementById('results').innerHTML = '';

  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&videoCategoryId=10&maxResults=5&key=${YOUTUBE_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const items = data.items || [];
    if (!items.length) {
      document.getElementById('results').innerHTML = '<div class="empty">ไม่พบเพลงที่ค้นหา</div>';
      return;
    }

    document.getElementById('results').innerHTML = items.map(item => {
      const vid = item.id.videoId;
      const title = item.snippet.title;
      const ch = item.snippet.channelTitle;
      const thumb = item.snippet.thumbnails.medium?.url || '';
      return `
        <div class="result-item">
          <img src="${thumb}" onerror="this.style.display='none'" />
          <div class="result-info">
            <div class="result-title">${escHtml(title)}</div>
            <div class="result-ch">${escHtml(ch)}</div>
          </div>
          <button class="add-btn" onclick="addSong('${escHtml(vid)}','${escHtml(title)}','${escHtml(thumb)}')" title="เพิ่มเพลง">＋</button>
        </div>`;
    }).join('');

  } catch (e) {
    errEl.textContent = 'ค้นหาไม่สำเร็จ: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ค้นหา';
  }
}

// ======================================================
// Add Song → Apps Script → Google Sheets
// ======================================================
async function addSong(videoId, title, thumbnail) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addSong',
        tableNumber,
        title,
        youtubeVideoId: videoId,
        thumbnailUrl: thumbnail,
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('successMsg').innerHTML =
      `<strong>${escHtml(title)}</strong><br>ถูกเพิ่มในคิวโต๊ะ ${tableNumber} แล้ว 🎶`;
    document.getElementById('searchSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';

  } catch (e) {
    alert('เพิ่มเพลงไม่สำเร็จ: ' + e.message);
  }
}

function addMore() {
  document.getElementById('searchSection').style.display = 'block';
  document.getElementById('successSection').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('results').innerHTML = '';
}

// Enter key search
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchYouTube();
});

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
</script>
</body>
</html>
